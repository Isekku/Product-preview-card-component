<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="index.css">
    
    <title>Frontend Mentor | Product preview card component</title>

  </head>

  <body>

    <article>
      <img src="images/image-product-desktop.jpg" id="perfumeImageDesktop">
      <div class="perfumeDesc">
        <span class="perfumeText">Perfume</span><br>

        <span class="perfumeBrand">Gabrielle Essence Eau De Parfum</span><br>

        <span class="perfumeDescription">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</span><br>

        <span class="perfumeNewPrice">$149.99</span>
        <span class="perfumeOldPrice">$169.99</span><br>

        <span class="perfumeATC">Add to Cart</span>
      </div>
    </article>

  </body>
</html>
