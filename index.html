<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    
    <title>Frontend Mentor | Product preview card component</title>
  </head>

  <body>
    <article class="mainContainer">
      <img src="images/image-product-desktop.jpg" class="imageDesktop">

      <div class="contenu">
        <p class="perfumeText">P E R F U M E</p>

        <p class="titleParfum">Gabrielle Essence Eau De Parfum</h1>

        <p class="descriptionParfume">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>

        <div class="price">
          <p class="textPrice"><span class="newPrice">$149.99</span><span class="oldPrice">$169.99</span></p>
        </div>

        <p>Add to Cart</p>
      </div>
    </article>
  </body>

</html>
